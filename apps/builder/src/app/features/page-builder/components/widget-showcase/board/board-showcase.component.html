<div class="showcase-page">
  @for (preset of presets; track preset.variant) {
    <div
      class="showcase-page__item"
      draggable="true"
      (dragstart)="startDrag($event, preset.variant, preset.label)"
      (dragend)="endDrag()"
    >
      <app-board-widget [variant]="preset.variant"></app-board-widget>
    </div>
  }
</div>
