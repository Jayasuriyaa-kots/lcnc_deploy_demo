<div class="showcase-page">
  @for (preset of presets; track preset.variant) {
    <div
      class="showcase-page__item"
      draggable="true"
      (dragstart)="startDrag($event, preset)"
      (dragend)="endDrag()"
    >
      <app-snippet-card
        [variant]="preset.variant"
        [selected]="!!preset.highlighted"
      ></app-snippet-card>
    </div>
  }
</div>
