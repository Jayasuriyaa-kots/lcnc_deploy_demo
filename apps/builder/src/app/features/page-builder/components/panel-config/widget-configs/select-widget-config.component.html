@if (activeTab() === 'display') {
  <app-select-settings-panel
    [label]="label()"
    [config]="config()"
    (labelChange)="labelChange.emit($event)"
    (configChange)="configChange.emit($event)"
  ></app-select-settings-panel>
}

@if (activeTab() === 'style') {
  <div class="prop-section-card">
    <div class="prop-section-card__header">{{ t('common.background') }}</div>
    <div class="prop-section-card__row">
      <label class="prop-row-label">{{ t('common.color') }}</label>
      <qo-color-picker
        class="prop-color-picker"
        [value]="config().backgroundColor"
        [presetColors]="colorPickerPalette()"
        [showThemeColor]="true"
        [triggerLabel]="'A'"
        (valueChange)="onBackgroundColorChanged($event)"
      ></qo-color-picker>
    </div>
  </div>
}
