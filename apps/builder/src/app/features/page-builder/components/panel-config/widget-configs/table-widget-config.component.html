@if (activeTab() === 'display') {
  <app-table-settings-panel
    [label]="label()"
    [config]="config()"
    (labelChange)="labelChange.emit($event)"
    (configChange)="onConfigChanged($event)"
  ></app-table-settings-panel>
}

@if (activeTab() === 'style') {
  <div class="prop-section-card">
    <div class="prop-section-card__header">{{ t('common.background') }}</div>
    <div class="prop-section-card__row">
      <label class="prop-row-label">{{ t('common.color') }}</label>
      <qo-color-picker
        class="prop-color-picker"
        [value]="config().backgroundColor"
        [presetColors]="colorPickerPalette()"
        [showThemeColor]="true"
        [triggerLabel]="'A'"
        (valueChange)="onBackgroundColorChanged($event)"
      ></qo-color-picker>
    </div>
  </div>

  <div class="prop-section-card">
    <div class="prop-section-card__header">{{ t('common.border') }}</div>
    <div class="prop-section-card__row">
      <label class="prop-row-label">{{ t('common.color') }}</label>
      <qo-color-picker
        class="prop-color-picker"
        [value]="config().borderColor"
        [presetColors]="colorPickerPalette()"
        [showThemeColor]="true"
        [triggerLabel]="'A'"
        (valueChange)="onBorderColorChanged($event)"
      ></qo-color-picker>
    </div>
    <div class="prop-section-card__row prop-section-card__row--divided">
        <label class="prop-row-label">{{ t('common.radius') }}</label>
      <qo-input
        class="prop-input prop-input--compact prop-input--wide"
        [value]="config().borderRadius"
        (valueChange)="onBorderRadiusChanged($event)"
      ></qo-input>
    </div>
  </div>
}
