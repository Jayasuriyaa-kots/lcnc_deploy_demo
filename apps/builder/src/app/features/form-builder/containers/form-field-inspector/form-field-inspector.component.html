@if (activeField(); as selectedField) {
  <div class="inspector">
    <div class="inspector__header">
      <div class="inspector__header-icon">
        <qo-icon [name]="getFieldIconName(selectedField.icon)" size="md"></qo-icon>
      </div>
      <div class="inspector__header-text">
        <p class="inspector__header-label">{{ t('inspector.fieldProperties') }}</p>
        <strong>{{ selectedField.label }}</strong>
        <span>{{ selectedField.type }} · {{ selectedField.binding }}</span>
      </div>
      <qo-button class="inspector__close" variant="ghost" size="sm" type="button" (click)="close()">
        <qo-icon name="x" size="sm"></qo-icon>
      </qo-button>
    </div>

    <app-form-field-inspector-identity-section
      [field]="selectedField"
      [context]="inspectorContext" />

    <app-form-field-inspector-date-media-section
      [field]="selectedField"
      [context]="inspectorContext" />

    <app-form-field-inspector-security-section
      [field]="selectedField"
      [context]="inspectorContext" />
  </div>
} @else {
  <div class="inspector inspector--empty">
    <qo-icon name="info" size="lg"></qo-icon>
    <p>{{ t('inspector.empty') }}</p>
  </div>
}
