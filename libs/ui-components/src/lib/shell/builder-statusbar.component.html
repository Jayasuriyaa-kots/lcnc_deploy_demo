<footer class="statusbar">
  <div class="statusbar__group statusbar__group--left">
    <span class="statusbar__live-dot"></span>
    <span class="statusbar__caps">{{ statusLabel() }}</span>
    <span>region: <strong>{{ region() }}</strong></span>
    <span class="statusbar__dot">&middot;</span>
    <span>{{ tenant() }} &middot; <strong>{{ environment() }}</strong></span>
  </div>

  <div class="statusbar__group statusbar__group--right">
    <span class="statusbar__item">
      <span class="material-symbols-outlined">history</span>
      {{ syncLabel() }}
    </span>
    <span class="statusbar__item">
      <span class="material-symbols-outlined">groups</span>
      {{ collaboratorsLabel() }}
    </span>
  </div>
</footer>
